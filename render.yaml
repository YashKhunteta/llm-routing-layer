services:
  - type: web
    name: llm-routing-layer
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
    disk:
      name: routing-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
